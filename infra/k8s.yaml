---
# Build: docker build -f infra/Dockerfile -t inference-router:latest .
# Push:  docker push <registry>/inference-router:latest
# Apply: kubectl apply -f infra/k8s.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: inference-router

---
apiVersion: v1
kind: Secret
metadata:
  name: inference-router-secrets
  namespace: inference-router
type: Opaque
stringData:
  # ── AWS Bedrock ────────────────────────────────────────────────────
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_REGION: "us-east-1"

  # ── GCP Vertex AI ──────────────────────────────────────────────────
  # Mount your service account JSON as a file and point the env var at it,
  # or use Workload Identity instead of a key file.
  GCP_PROJECT_ID: ""
  GCP_REGION: "us-central1"
  # GOOGLE_APPLICATION_CREDENTIALS is set by the volume mount below

  # ── Azure OpenAI ───────────────────────────────────────────────────
  AZURE_OPENAI_API_KEY: ""
  AZURE_OPENAI_ENDPOINT: ""
  AZURE_OPENAI_DEPLOYMENT: "gpt-35-turbo"
  AZURE_OPENAI_API_VERSION: "2024-02-01"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: inference-router-config
  namespace: inference-router
data:
  MOCK_MODE: "false"          # set to "true" for demo mode without credentials
  LATENCY_WEIGHT: "0.001"     # $/second latency penalty

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-router
  namespace: inference-router
  labels:
    app: inference-router
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inference-router
  template:
    metadata:
      labels:
        app: inference-router
    spec:
      containers:
        - name: inference-router
          image: inference-router:latest   # replace with your registry image
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: inference-router-secrets
            - configMapRef:
                name: inference-router-config
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/providers
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/providers
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: inference-router
  namespace: inference-router
spec:
  selector:
    app: inference-router
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer   # change to ClusterIP + Ingress for production TLS
